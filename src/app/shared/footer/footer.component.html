<footer id="footerCard" [class.expanded]="isExpanded">

  <div class="footer-top" (click)="toggleFooter()">
    <div class="brand">
      Habit Bloom <ion-icon name="leaf-outline"></ion-icon>
    </div>
    <div class="toggle-icon">
      {{ isExpanded ? '−' : '+' }}
    </div>
  </div>

  <div class="footer-content">

    <div class="footer-column">
      <h4>About</h4>
      <p>Transform habits into growth.</p>
      <p>Build. Track. Bloom.</p>
    </div>

    <div class="footer-column">
      <h4>Quick Links</h4>
      <a routerLink="/home">Home</a>
      <a routerLink="/about">About</a>
      <a routerLink="/contact">Contact</a>
      <a routerLink="/login">Login</a>
    </div>

    <div class="footer-column">
      <h4>Contact</h4>
      <p>support@habitbloom.com</p>
      <p>+91 98765 43210</p>
      <p>Chennai, India</p>
    </div>

  </div>

</footer>
