<svg width="320" height="380" viewBox="0 0 320 380" xmlns="http://www.w3.org/2000/svg">

  <!-- Ground Shadow -->
  <ellipse cx="160" cy="350" rx="80" ry="18" fill="rgba(0,0,0,0.15)"></ellipse>

  <!-- Tree Trunk Gradient -->
  <defs>
    <linearGradient id="trunkGradient" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#8D6E63"></stop>
      <stop offset="100%" stop-color="#5D4037"></stop>
    </linearGradient>

    <radialGradient id="leafLight" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#81C784"></stop>
      <stop offset="100%" stop-color="#2E7D32"></stop>
    </radialGradient>
  </defs>

  <!-- Leaves Main -->
  <circle cx="160" cy="130" r="90" fill="url(#leafLight)"></circle>
  <circle cx="100" cy="170" r="70" fill="#388E3C"></circle>
  <circle cx="220" cy="170" r="70" fill="#388E3C"></circle>
  <circle cx="160" cy="210" r="80" fill="#2E7D32"></circle>

  <!-- Extra depth leaves -->
  <circle cx="130" cy="100" r="40" fill="#66BB6A" opacity="0.8"></circle>
  <circle cx="190" cy="110" r="35" fill="#66BB6A" opacity="0.8"></circle>

  <!-- Trunk -->
  <rect x="140" y="220" width="40" height="120" rx="15" fill="url(#trunkGradient)"></rect>

</svg>
